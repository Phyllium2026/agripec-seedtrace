<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGRIPEC SeedTrace | Sector</title>
<link rel="stylesheet" href="styles.css">
<style>
.sector-page{max-width:1000px;margin:0 auto;padding:28px 18px}
.sector-header{background:linear-gradient(180deg,#fff,#eaf5ec);border:1px solid #dbe8de;border-radius:28px;padding:28px;text-align:center;box-shadow:0 16px 40px rgba(3,53,34,.08)}
.sector-logos{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:20px}
.sector-logos img:first-child{max-height:125px;max-width:280px;object-fit:contain}
.sector-logos img:last-child{max-height:80px;max-width:260px;object-fit:contain}
.sector-title{color:#033522;font-size:clamp(32px,5vw,52px);margin:0}
.sector-subtitle{color:#667085;font-size:18px;margin-top:10px}
.sector-chip{display:inline-block;margin-top:16px;background:#033522;color:#fff;padding:10px 18px;border-radius:999px;font-weight:800}
.data-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:22px}
.data-card{background:#fff;border:1px solid #dbe8de;border-radius:22px;padding:22px;box-shadow:0 8px 20px rgba(3,53,34,.04)}
.data-card.full{grid-column:1/-1}
.label{color:#667085;font-size:13px;text-transform:uppercase;letter-spacing:.5px;font-weight:800;margin-bottom:6px}
.value{color:#033522;font-size:22px;font-weight:800;line-height:1.2;min-height:28px}
.value.small{font-size:17px;font-weight:700}
.dates{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.date-box{background:#f7faf7;border:1px solid #dbe8de;border-radius:16px;padding:14px}
.status{display:inline-block;background:#eaf5ec;color:#033522;padding:8px 14px;border-radius:999px;font-weight:800}
.sector-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.loading{text-align:center;padding:28px;color:#667085}
@media(max-width:760px){.sector-logos{flex-direction:column}.data-grid{grid-template-columns:1fr}.dates{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="sector-page">
<section class="sector-header">
<div class="sector-logos">
<img src="agripec.png" alt="AGRIPEC">
<img src="hmclause.png" alt="HM Clause">
</div>
<h1 class="sector-title">AGRIPEC SeedTrace</h1>
<p class="sector-subtitle">Ficha digital de trazabilidad por sector</p>
<div class="sector-chip" id="sectorChip">Sector</div>
</section>
<section id="content" class="loading">Cargando información del sector...</section>
</main>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOhlM_GC3sb9u4XsgPL8KzWVpU8uSFydvVQN-YhHWWH_umMpFAYXaMJf8BpR0VPKVDn2Grmi_RIMTw/pub?gid=776033902&single=true&output=csv";
const FORM_URL = "https://forms.gle/c7t7RRKLJdwwVP5R7";
function getSectorFromUrl() { return new URLSearchParams(window.location.search).get("id"); }
function parseCSV(text) {
  const rows=[]; let row=[], current="", inQuotes=false;
  for(let i=0;i<text.length;i++) {
    const char=text[i], next=text[i+1];
    if(char === '"' && inQuotes && next === '"'){ current += '"'; i++; }
    else if(char === '"'){ inQuotes = !inQuotes; }
    else if(char === "," && !inQuotes){ row.push(current.trim()); current=""; }
    else if((char === "\n" || char === "\r") && !inQuotes){ if(current || row.length){ row.push(current.trim()); rows.push(row); row=[]; current=""; } }
    else current += char;
  }
  if(current || row.length){ row.push(current.trim()); rows.push(row); }
  return rows;
}
function rowsToObjects(rows) {
  const headers=rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.some(c=>c)).map(row=>{ const obj={}; headers.forEach((h,i)=>obj[h]=row[i]||""); return obj; });
}
function clean(v) { return v && String(v).trim() ? v : "Por completar"; }
function renderSector(data, sector) {
  document.getElementById("sectorChip").textContent = "Sector " + sector;
  const content=document.getElementById("content");
  if(!data) {
    content.innerHTML = `<section class="card"><h2>Sector ${sector}</h2><p>No se encontró información para este sector en la hoja LOTES.</p><div class="buttons"><a class="btn primary" href="${FORM_URL}" target="_blank">Registrar actividad</a><a class="btn secondary" href="/">Volver al inicio</a></div></section>`;
    return;
  }
  const fotos=data.Link_Fotos, video=data.Link_Video;
  content.className="data-grid";
  content.innerHTML = `
  <article class="data-card"><div class="label">Código lote</div><div class="value">${clean(data.Codigo_Lote)}</div></article>
  <article class="data-card"><div class="label">Programa</div><div class="value">${clean(data.Programa)}</div></article>
  <article class="data-card"><div class="label">Cultivo</div><div class="value">${clean(data.Cultivo)}</div></article>
  <article class="data-card"><div class="label">Cruce</div><div class="value">${clean(data.Cruce)}</div></article>
  <article class="data-card"><div class="label">Superficie</div><div class="value">${clean(data.Superficie_ha)} ha</div></article>
  <article class="data-card"><div class="label">Distribución</div><div class="value small">2H : 1M · PVC rojo = hembra · PVC azul = macho</div></article>
  <article class="data-card"><div class="label">Plantas hembras</div><div class="value">${clean(data.Hembras)}</div></article>
  <article class="data-card"><div class="label">Plantas machos</div><div class="value">${clean(data.Machos)}</div></article>
  <article class="data-card full"><div class="label">Fechas de trasplante</div><div class="dates">
  <div class="date-box"><div class="label">Hembra</div><div class="value small">${clean(data.Fecha_Trasplante_Hembra)}</div></div>
  <div class="date-box"><div class="label">M1</div><div class="value small">${clean(data.Fecha_M1)}</div></div>
  <div class="date-box"><div class="label">M2</div><div class="value small">${clean(data.Fecha_M2)}</div></div>
  <div class="date-box"><div class="label">M3</div><div class="value small">${clean(data.Fecha_M3)}</div></div>
  <div class="date-box"><div class="label">M4</div><div class="value small">${clean(data.Fecha_M4)}</div></div>
  </div></article>
  <article class="data-card"><div class="label">Estado actual</div><div class="value"><span class="status">${clean(data.Estado)}</span></div></article>
  <article class="data-card"><div class="label">Observaciones</div><div class="value small">${clean(data.Observaciones)}</div></article>
  <article class="data-card full"><div class="sector-actions">
  <a class="btn primary" href="${FORM_URL}" target="_blank">Registrar actividad</a>
  ${fotos ? `<a class="btn secondary" href="${fotos}" target="_blank">Ver fotos</a>` : ""}
  ${video ? `<a class="btn secondary" href="${video}" target="_blank">Ver video</a>` : ""}
  <a class="btn secondary" href="/">Volver al inicio</a>
  </div></article>`;
}
async function init() {
  const sector=getSectorFromUrl();
  if(!sector){ document.getElementById("content").innerHTML="Falta parámetro de sector. Ejemplo: sector.html?id=8"; return; }
  try {
    const response=await fetch(CSV_URL);
    const text=await response.text();
    const objects=rowsToObjects(parseCSV(text));
    const found=objects.find(r=>String(r.Sector).trim()===String(sector).trim());
    renderSector(found, sector);
  } catch(e) {
    document.getElementById("content").innerHTML="No fue posible cargar la información desde Google Sheets.";
  }
}
init();
</script>
</body>
</html>
